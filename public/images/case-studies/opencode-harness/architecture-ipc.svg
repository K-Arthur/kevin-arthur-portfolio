<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif" role="img" aria-label="Architecture diagram: the Extension Host running in Node.js communicates with the isolated Webview panel through an asynchronous postMessage IPC bridge, and with the opencode server over the HTTP SDK.">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#94a3b8"/>
    </marker>
    <marker id="arrowAccent" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#818cf8"/>
    </marker>
  </defs>

  <rect x="1" y="1" width="958" height="538" rx="18" fill="#0b1220" stroke="#1f2937" stroke-width="2"/>
  <text x="32" y="40" fill="#e2e8f0" font-size="20" font-weight="700">A process boundary is a truth boundary</text>
  <text x="32" y="62" fill="#64748b" font-size="13">Extension Host (Node.js) &#8596; Webview (isolated DOM), bridged only by async postMessage IPC</text>

  <!-- HOST PANEL -->
  <rect x="32" y="86" width="392" height="372" rx="12" fill="#0f172a" stroke="#334155" stroke-width="1.5"/>
  <text x="52" y="114" fill="#93c5fd" font-size="13" font-weight="700" letter-spacing="1">EXTENSION HOST &#183; NODE.JS</text>

  <rect x="52" y="128" width="352" height="46" rx="8" fill="#1e293b" stroke="#475569"/>
  <text x="228" y="151" fill="#f1f5f9" font-size="14" font-weight="600" text-anchor="middle">ChatProvider</text>
  <text x="228" y="167" fill="#94a3b8" font-size="11" text-anchor="middle">thin orchestrator</text>

  <rect x="52" y="190" width="352" height="58" rx="8" fill="#172033" stroke="#3b4a63"/>
  <text x="228" y="212" fill="#cbd5e1" font-size="12.5" font-weight="600" text-anchor="middle">Focused services</text>
  <text x="228" y="231" fill="#94a3b8" font-size="11" text-anchor="middle">TabManager &#183; StreamCoordinator &#183; MessageRouter &#183; DiffHandler</text>

  <!-- globalState cylinder -->
  <g>
    <path d="M148 318 a80 14 0 0 0 160 0 v54 a80 14 0 0 1 -160 0 z" fill="#1e293b" stroke="#818cf8" stroke-width="1.5"/>
    <ellipse cx="228" cy="318" rx="80" ry="14" fill="#243049" stroke="#818cf8" stroke-width="1.5"/>
    <text x="228" y="356" fill="#c7d2fe" font-size="13" font-weight="600" text-anchor="middle">globalState</text>
    <text x="228" y="372" fill="#94a3b8" font-size="10.5" text-anchor="middle">durable store</text>
  </g>
  <text x="228" y="430" fill="#64748b" font-size="11" text-anchor="middle">single source of truth</text>

  <line x1="228" y1="174" x2="228" y2="188" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="228" y1="248" x2="228" y2="300" stroke="#818cf8" stroke-width="1.5" marker-start="url(#arrowAccent)" marker-end="url(#arrowAccent)"/>

  <!-- WEBVIEW PANEL -->
  <rect x="536" y="86" width="392" height="372" rx="12" fill="#0f172a" stroke="#334155" stroke-width="1.5"/>
  <text x="556" y="114" fill="#93c5fd" font-size="13" font-weight="700" letter-spacing="1">WEBVIEW &#183; ISOLATED DOM</text>

  <rect x="556" y="128" width="352" height="46" rx="8" fill="#1e293b" stroke="#475569"/>
  <text x="732" y="151" fill="#f1f5f9" font-size="14" font-weight="600" text-anchor="middle">main.ts</text>
  <text x="732" y="167" fill="#94a3b8" font-size="11" text-anchor="middle">dispatch + state</text>

  <rect x="556" y="190" width="352" height="44" rx="8" fill="#172033" stroke="#3b4a63"/>
  <text x="732" y="217" fill="#cbd5e1" font-size="12.5" text-anchor="middle">renderer.ts &#8212; text &#183; tools &#183; diffs</text>

  <rect x="556" y="250" width="352" height="44" rx="8" fill="#172033" stroke="#3b4a63"/>
  <text x="732" y="277" fill="#cbd5e1" font-size="12.5" text-anchor="middle">composer.ts &#8212; input &#183; queue &#183; slash</text>

  <line x1="732" y1="174" x2="732" y2="188" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="732" y1="234" x2="732" y2="248" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- IPC BRIDGE -->
  <line x1="424" y1="240" x2="536" y2="240" stroke="#22d3ee" stroke-width="2.5" marker-start="url(#arrow)" marker-end="url(#arrow)"/>
  <rect x="404" y="200" width="152" height="22" rx="6" fill="#0b1220"/>
  <text x="480" y="216" fill="#67e8f9" font-size="12" font-weight="700" text-anchor="middle">postMessage IPC</text>
  <text x="480" y="262" fill="#64748b" font-size="10.5" text-anchor="middle">async &#183; serialized</text>

  <!-- opencode serve -->
  <rect x="332" y="482" width="296" height="40" rx="20" fill="#0f172a" stroke="#22d3ee" stroke-width="1.5"/>
  <text x="480" y="507" fill="#a5f3fc" font-size="13" font-weight="600" text-anchor="middle">opencode serve  (HTTP SDK)</text>
  <line x1="228" y1="386" x2="228" y2="502" stroke="#475569" stroke-width="1.3" stroke-dasharray="4 4"/>
  <line x1="228" y1="502" x2="330" y2="502" stroke="#475569" stroke-width="1.3" marker-end="url(#arrow)"/>
</svg>
